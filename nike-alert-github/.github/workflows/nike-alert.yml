name: Nike Alert

on:
  schedule:
    - cron: '*/5 * * * *'


jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build project
        run: mvn -B install -DskipTests --no-transfer-progress

      - name: Ensure Playwright browsers and dependencies are installed
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Nike alert
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: xvfb-run -a mvn -q compile exec:java -Dexec.mainClass="com.christie.alert.NikeAlert"
