- name: Install xvfb
    run: sudo apt-get update && sudo apt-get install -y xvfb

    - name: Run Nike alert
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: xvfb-run -a mvn -q compile exec:java -Dexec.mainClass="com.christie.alert.NikeAlert"